<nav class="navbar navbar-expand-lg custom-navbar shadow-sm">

    </a>

    <div class="collapse navbar-collapse">

      <ul class="navbar-nav ms-auto align-items-center">

          <li class="nav-item">
            <a class="btn btn-outline-light ms-2" routerLink="/home">Accueil</a>
          </li>

          <li class="nav-item">
            <a class="btn btn-outline-light ms-2" routerLink="/login">Connexion</a>

            </a>

            </span>
          </li>

          <li class="nav-item">

          <li class="nav-item">
